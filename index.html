<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>대포 닉네임 뽑기</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
      background: #0b1120;
      color: #e5e7eb;
      overflow: hidden;
    }

    body {
      display: flex;
    }

    .app {
      display: flex;
      width: 100%;
      height: 100%;
    }

    .left {
      flex: 1;
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 15%, rgba(96, 165, 250, 0.18), transparent 28%),
        linear-gradient(180deg, #0f172a 0%, #111827 55%, #0b1120 100%);
      border-right: 1px solid #1f2937;
    }

    .sky {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, #1e293b 0%, #111827 55%, #0f172a 100%);
    }

    .hill-back {
      position: absolute;
      left: -10%;
      bottom: 16%;
      width: 75%;
      height: 22%;
      background: #14532d;
      border-top: 5px solid #0a0a0a;
      border-radius: 50% 50% 0 0 / 100% 100% 0 0;
      transform: rotate(1.5deg);
      box-shadow: inset 0 10px 20px rgba(255,255,255,0.03);
    }

    .hill-front {
      position: absolute;
      right: -8%;
      bottom: 16%;
      width: 70%;
      height: 26%;
      background: #65a30d;
      border-top: 3px solid #0a0a0a;
      border-radius: 50% 50% 0 0 / 100% 100% 0 0;
      box-shadow: inset 0 12px 20px rgba(255,255,255,0.05);
    }

    .ground {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 16%;
      background: linear-gradient(180deg, #1f2937 0%, #111827 100%);
      border-top: 2px solid rgba(255,255,255,0.05);
    }

    .cannon-wrap {
      position: absolute;
      left: 50%;
      bottom: 10%;
      width: 240px;
      height: 300px;
      transform: translateX(-50%);
      z-index: 5;
    }

    .cannon-body {
      position: absolute;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: 200px;
      height: 260px;
      background: linear-gradient(90deg, #92400e 0%, #f59e0b 34%, #d97706 68%, #92400e 100%);
      clip-path: polygon(12% 100%, 0% 24%, 100% 24%, 88% 100%);
      border: 3px solid #0a0a0a;
      box-shadow: 0 18px 30px rgba(0,0,0,0.35);
    }

    .cannon-rim {
      position: absolute;
      left: 50%;
      top: 56px;
      transform: translateX(-50%);
      width: 164px;
      height: 28px;
      border-radius: 50%;
      background: linear-gradient(180deg, #fde68a, #f59e0b);
      border: 3px solid #0a0a0a;
      z-index: 2;
    }

    .cannon-hole {
      position: absolute;
      left: 50%;
      top: 61px;
      transform: translateX(-50%);
      width: 134px;
      height: 18px;
      border-radius: 50%;
      background: #111827;
      border: 2px solid rgba(255,255,255,0.08);
      z-index: 3;
    }

    .fire-btn {
      position: absolute;
      left: 50%;
      top: 128px;
      transform: translateX(-50%);
      width: 76px;
      height: 76px;
      border-radius: 50%;
      border: 3px solid #0a0a0a;
      background: radial-gradient(circle at 30% 30%, #fde047, #eab308);
      color: #111827;
      font-size: 24px;
      font-weight: 900;
      cursor: pointer;
      z-index: 4;
      box-shadow: 0 8px 18px rgba(0,0,0,0.35);
      transition: transform 0.1s ease, filter 0.15s ease;
    }

    .fire-btn:hover {
      filter: brightness(1.05);
    }

    .fire-btn:active {
      transform: translateX(-50%) scale(0.96);
    }

    .shot-name {
      position: absolute;
      left: 50%;
      bottom: 235px;
      transform: translateX(-50%);
      min-width: 120px;
      max-width: 300px;
      padding: 12px 20px;
      border-radius: 999px;
      background: linear-gradient(180deg, #f8fafc, #cbd5e1);
      color: #0f172a;
      font-size: 22px;
      font-weight: 900;
      text-align: center;
      border: 3px solid #0a0a0a;
      box-shadow: 0 14px 28px rgba(0,0,0,0.35);
      opacity: 0;
      pointer-events: none;
      z-index: 8;
      white-space: nowrap;
    }

    .shot-name.launch {
      animation: launchName 1s ease-out forwards;
    }

    @keyframes launchName {
      0% {
        opacity: 0;
        transform: translateX(-50%) translateY(20px) scale(0.6);
      }
      10% {
        opacity: 1;
        transform: translateX(-50%) translateY(-10px) scale(1);
      }
      35% {
        opacity: 1;
        transform: translateX(-50%) translateY(-110px) scale(1.03);
      }
      60% {
        opacity: 1;
        transform: translateX(-50%) translateY(-185px) scale(1.06);
      }
      100% {
        opacity: 0;
        transform: translateX(-50%) translateY(-260px) scale(1.08);
      }
    }

    .flash {
      position: absolute;
      left: 50%;
      top: 42px;
      transform: translateX(-50%);
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(253,224,71,0.95), rgba(251,191,36,0.5), transparent 70%);
      opacity: 0;
      z-index: 7;
      pointer-events: none;
    }

    .flash.show {
      animation: flashPop 0.28s ease-out;
    }

    @keyframes flashPop {
      0% { opacity: 0; transform: translateX(-50%) scale(0.4); }
      35% { opacity: 1; transform: translateX(-50%) scale(1); }
      100% { opacity: 0; transform: translateX(-50%) scale(1.6); }
    }

    .top-left-panel {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 340px;
      max-width: calc(100% - 40px);
      background: rgba(15, 23, 42, 0.92);
      border: 1px solid #334155;
      border-radius: 18px;
      padding: 14px;
      z-index: 20;
      box-shadow: 0 16px 30px rgba(0,0,0,0.25);
    }

    .panel-title {
      font-size: 18px;
      font-weight: 900;
      margin-bottom: 10px;
      color: #f8fafc;
    }

    .panel-desc {
      font-size: 13px;
      color: #94a3b8;
      line-height: 1.5;
      margin-bottom: 10px;
    }

    textarea {
      width: 100%;
      height: 130px;
      resize: none;
      border-radius: 12px;
      border: 1px solid #475569;
      background: #020617;
      color: #f8fafc;
      padding: 12px;
      font-size: 14px;
      outline: none;
    }

    textarea:focus {
      border-color: #60a5fa;
    }

    .panel-row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .small-btn {
      flex: 1;
      border: none;
      border-radius: 10px;
      padding: 11px 12px;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      color: white;
    }

    .blue {
      background: #2563eb;
    }

    .gray {
      background: #334155;
    }

    .status {
      margin-top: 10px;
      font-size: 13px;
      color: #cbd5e1;
    }

    .right {
      width: 270px;
      background: #0f172a;
      position: relative;
      display: flex;
      flex-direction: column;
      border-left: 1px solid #1f2937;
    }

    .history-card {
      margin: 18px;
      flex: 1;
      background: #111827;
      border: 2px solid #374151;
      border-radius: 22px;
      padding: 18px 16px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 10px 24px rgba(0,0,0,0.25);
    }

    .history-title {
      font-size: 20px;
      font-weight: 900;
      color: #f3f4f6;
      margin-bottom: 14px;
      text-align: center;
    }

    .history-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding-right: 4px;
    }

    .history-item {
      background: #1f2937;
      color: #f9fafb;
      border: 1px solid #374151;
      border-radius: 14px;
      padding: 12px 10px;
      font-size: 17px;
      font-weight: 800;
      text-align: center;
      word-break: break-word;
    }

    .empty-text {
      color: #64748b;
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
    }

    .bottom-right {
      padding: 0 18px 18px;
    }

    .reset-btn {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 16px;
      background: linear-gradient(180deg, #ef4444, #b91c1c);
      color: white;
      font-size: 18px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(0,0,0,0.25);
    }

    .current-badge {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(15, 23, 42, 0.92);
      border: 1px solid #334155;
      border-radius: 14px;
      padding: 12px 14px;
      z-index: 20;
      min-width: 180px;
      text-align: center;
      box-shadow: 0 10px 24px rgba(0,0,0,0.25);
    }

    .current-label {
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 6px;
    }

    .current-name {
      font-size: 22px;
      font-weight: 900;
      color: #f8fafc;
      word-break: break-word;
    }

    @media (max-width: 1000px) {
      .right {
        width: 220px;
      }

      .top-left-panel {
        width: 300px;
      }
    }

    @media (max-width: 820px) {
      html, body {
        overflow: auto;
      }

      .app {
        flex-direction: column;
        height: auto;
        min-height: 100%;
      }

      .left {
        min-height: 78vh;
      }

      .right {
        width: 100%;
        min-height: 280px;
      }

      .history-card {
        margin: 16px 16px 10px;
      }

      .bottom-right {
        padding: 0 16px 16px;
      }

      .current-badge {
        top: auto;
        bottom: 20px;
        right: 20px;
        left: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="left">
      <div class="sky"></div>
      <div class="hill-back"></div>
      <div class="hill-front"></div>
      <div class="ground"></div>

      <div class="top-left-panel">
        <div class="panel-title">닉네임 입력</div>
        <div class="panel-desc">
          한 줄에 하나씩 넣거나 쉼표(,)로 넣어도 됩니다
        </div>
        <textarea id="nameInput" placeholder="예시"></textarea>

        <div class="panel-row">
          <button class="small-btn blue" onclick="startGame()">시작</button>
          <button class="small-btn gray" onclick="shuffleNames()">섞기</button>
        </div>

        <div class="status" id="statusText">아직 시작 안 함</div>
      </div>

      <div class="current-badge">
        <div class="current-label">현재 나온 닉네임</div>
        <div class="current-name" id="currentName">-</div>
      </div>

      <div class="cannon-wrap">
        <div class="flash" id="flash"></div>
        <div class="shot-name" id="shotName">닉네임</div>
        <div class="cannon-rim"></div>
        <div class="cannon-hole"></div>
        <div class="cannon-body"></div>
        <button class="fire-btn" onclick="fireName()">발사</button>
      </div>
    </div>

    <div class="right">
      <div class="history-card">
        <div class="history-title">최근 나온 닉네임</div>
        <div class="history-list" id="historyList">
          <div class="empty-text">아직 나온 닉네임 없음</div>
        </div>
      </div>

      <div class="bottom-right">
        <button class="reset-btn" onclick="resetGame()">다시</button>
      </div>
    </div>
  </div>

  <script>
    const nameInput = document.getElementById("nameInput");
    const historyList = document.getElementById("historyList");
    const currentName = document.getElementById("currentName");
    const statusText = document.getElementById("statusText");
    const shotName = document.getElementById("shotName");
    const flash = document.getElementById("flash");

    let originalNames = [];
    let availableNames = [];
    let history = [];
    let started = false;
    let firing = false;
    let audioCtx = null;

    function ensureAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === "suspended") {
        audioCtx.resume();
      }
    }

    function playLaunchSound() {
      try {
        ensureAudio();
        const now = audioCtx.currentTime;

        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc.type = "square";
        osc.frequency.setValueAtTime(200, now);
        osc.frequency.exponentialRampToValueAtTime(60, now + 0.22);

        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(0.4, now + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.24);

        osc.connect(gain);
        gain.connect(audioCtx.destination);

        osc.start(now);
        osc.stop(now + 0.24);
      } catch (e) {}
    }

    function playResultSound() {
      try {
        ensureAudio();
        const now = audioCtx.currentTime;

        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc.type = "triangle";
        osc.frequency.setValueAtTime(620, now);
        osc.frequency.exponentialRampToValueAtTime(900, now + 0.14);

        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(0.16, now + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.18);

        osc.connect(gain);
        gain.connect(audioCtx.destination);

        osc.start(now);
        osc.stop(now + 0.18);
      } catch (e) {}
    }

    function parseNames(text) {
      return text
        .split(/\n|,/)
        .map(v => v.trim())
        .filter(v => v.length > 0);
    }

    function updateStatus() {
      if (!started) {
        statusText.textContent = "아직 시작 안 함";
        return;
      }
      statusText.textContent = `전체 ${originalNames.length}개 / 남은 ${availableNames.length}개 / 나온 ${history.length}개`;
    }

    function renderHistory() {
      historyList.innerHTML = "";

      if (history.length === 0) {
        historyList.innerHTML = '<div class="empty-text">아직 나온 닉네임 없음</div>';
        return;
      }

      [...history].reverse().forEach(name => {
        const div = document.createElement("div");
        div.className = "history-item";
        div.textContent = name;
        historyList.appendChild(div);
      });
    }

    function shuffleArray(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
    }

    function startGame() {
      const parsed = parseNames(nameInput.value);

      if (parsed.length === 0) {
        alert("닉네임을 먼저 입력해주세요");
        return;
      }

      try {
        ensureAudio();
      } catch (e) {}

      originalNames = [...parsed];
      availableNames = [...parsed];
      history = [];
      started = true;
      firing = false;
      currentName.textContent = "-";
      renderHistory();
      updateStatus();
    }

    function shuffleNames() {
      const parsed = parseNames(nameInput.value);

      if (parsed.length === 0) {
        alert("닉네임을 먼저 입력해주세요");
        return;
      }

      shuffleArray(parsed);
      nameInput.value = parsed.join("\n");
    }

    function showShotEffect(name) {
      shotName.textContent = name;
      shotName.classList.remove("launch");
      void shotName.offsetWidth;
      shotName.classList.add("launch");

      flash.classList.remove("show");
      void flash.offsetWidth;
      flash.classList.add("show");
    }

    function fireName() {
      if (!started) {
        alert("먼저 시작 눌러주세요");
        return;
      }

      if (firing) return;

      if (availableNames.length === 0) {
        alert("더 뽑을 닉네임이 없음");
        return;
      }

      firing = true;

      const index = Math.floor(Math.random() * availableNames.length);
      const picked = availableNames[index];
      availableNames.splice(index, 1);

      playLaunchSound();
      showShotEffect(picked);

      setTimeout(() => {
        currentName.textContent = picked;
        history.push(picked);
        renderHistory();
        updateStatus();
        playResultSound();
        firing = false;
      }, 620);
    }

    function resetGame() {
      originalNames = [];
      availableNames = [];
      history = [];
      started = false;
      firing = false;
      currentName.textContent = "-";
      shotName.classList.remove("launch");
      renderHistory();
      updateStatus();
    }

    renderHistory();
    updateStatus();
  </script>
</body>
</html>
