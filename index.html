<script>
  const nameInput = document.getElementById("nameInput");
  const historyList = document.getElementById("historyList");
  const currentName = document.getElementById("currentName");
  const statusText = document.getElementById("statusText");
  const shotName = document.getElementById("shotName");
  const flash = document.getElementById("flash");

  let originalNames = [];
  let availableNames = [];
  let history = [];
  let started = false;
  let firing = false;
  let audioCtx = null;

  function ensureAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === "suspended") {
      audioCtx.resume();
    }
  }

  function playLaunchSound() {
    try {
      ensureAudio();
      const now = audioCtx.currentTime;

      const master = audioCtx.createGain();
      master.gain.setValueAtTime(0.9, now);
      master.connect(audioCtx.destination);

      const compressor = audioCtx.createDynamicsCompressor();
      compressor.threshold.setValueAtTime(-18, now);
      compressor.knee.setValueAtTime(20, now);
      compressor.ratio.setValueAtTime(12, now);
      compressor.attack.setValueAtTime(0.003, now);
      compressor.release.setValueAtTime(0.2, now);
      compressor.connect(master);

      const bodyOsc = audioCtx.createOscillator();
      const bodyGain = audioCtx.createGain();
      bodyOsc.type = "sawtooth";
      bodyOsc.frequency.setValueAtTime(110, now);
      bodyOsc.frequency.exponentialRampToValueAtTime(38, now + 0.35);
      bodyGain.gain.setValueAtTime(0.0001, now);
      bodyGain.gain.exponentialRampToValueAtTime(0.75, now + 0.008);
      bodyGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.42);
      bodyOsc.connect(bodyGain);
      bodyGain.connect(compressor);
      bodyOsc.start(now);
      bodyOsc.stop(now + 0.42);

      const thumpOsc = audioCtx.createOscillator();
      const thumpGain = audioCtx.createGain();
      thumpOsc.type = "square";
      thumpOsc.frequency.setValueAtTime(58, now);
      thumpOsc.frequency.exponentialRampToValueAtTime(30, now + 0.28);
      thumpGain.gain.setValueAtTime(0.0001, now);
      thumpGain.gain.exponentialRampToValueAtTime(0.9, now + 0.005);
      thumpGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.3);
      thumpOsc.connect(thumpGain);
      thumpGain.connect(compressor);
      thumpOsc.start(now);
      thumpOsc.stop(now + 0.3);

      const bufferSize = audioCtx.sampleRate * 0.6;
      const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = noiseBuffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
      }

      const noise = audioCtx.createBufferSource();
      noise.buffer = noiseBuffer;

      const noiseFilter = audioCtx.createBiquadFilter();
      noiseFilter.type = "lowpass";
      noiseFilter.frequency.setValueAtTime(900, now);
      noiseFilter.Q.setValueAtTime(0.8, now);

      const noiseGain = audioCtx.createGain();
      noiseGain.gain.setValueAtTime(0.0001, now);
      noiseGain.gain.exponentialRampToValueAtTime(0.9, now + 0.004);
      noiseGain.gain.exponentialRampToValueAtTime(0.22, now + 0.12);
      noiseGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.58);

      noise.connect(noiseFilter);
      noiseFilter.connect(noiseGain);
      noiseGain.connect(compressor);
      noise.start(now);
      noise.stop(now + 0.58);

      const echoDelay = audioCtx.createDelay(0.5);
      const echoGain = audioCtx.createGain();
      echoDelay.delayTime.setValueAtTime(0.16, now);
      echoGain.gain.setValueAtTime(0.18, now);
      compressor.connect(echoDelay);
      echoDelay.connect(echoGain);
      echoGain.connect(master);
    } catch (e) {
      console.log("발사음 재생 실패:", e);
    }
  }

  function playResultSound() {
    try {
      ensureAudio();
      const now = audioCtx.currentTime;

      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.type = "triangle";
      osc.frequency.setValueAtTime(620, now);
      osc.frequency.exponentialRampToValueAtTime(900, now + 0.14);

      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.16, now + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.18);

      osc.connect(gain);
      gain.connect(audioCtx.destination);

      osc.start(now);
      osc.stop(now + 0.18);
    } catch (e) {}
  }

  function parseNames(text) {
    return text
      .split(/\n|,/)
      .map(v => v.trim())
      .filter(v => v.length > 0);
  }

  function updateStatus() {
    if (!started) {
      statusText.textContent = "아직 시작 안 함";
      return;
    }
    statusText.textContent = `전체 ${originalNames.length}개 / 남은 ${availableNames.length}개 / 나온 ${history.length}개`;
  }

  function renderHistory() {
    historyList.innerHTML = "";

    if (history.length === 0) {
      historyList.innerHTML = '<div class="empty-text">아직 나온 닉네임 없음</div>';
      return;
    }

    [...history].reverse().forEach(name => {
      const div = document.createElement("div");
      div.className = "history-item";
      div.textContent = name;
      historyList.appendChild(div);
    });
  }

  function shuffleArray(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
  }

  function startGame() {
    const parsed = parseNames(nameInput.value);

    if (parsed.length === 0) {
      alert("닉네임을 먼저 입력해주세요");
      return;
    }

    try {
      ensureAudio();
    } catch (e) {}

    originalNames = [...parsed];
    availableNames = [...parsed];
    history = [];
    started = true;
    firing = false;
    currentName.textContent = "-";
    renderHistory();
    updateStatus();
  }

  function shuffleNames() {
    const parsed = parseNames(nameInput.value);

    if (parsed.length === 0) {
      alert("닉네임을 먼저 입력해주세요");
      return;
    }

    shuffleArray(parsed);
    nameInput.value = parsed.join("\n");
  }

  function showShotEffect(name) {
    shotName.textContent = name;
    shotName.classList.remove("launch");
    void shotName.offsetWidth;
    shotName.classList.add("launch");

    flash.classList.remove("show");
    void flash.offsetWidth;
    flash.classList.add("show");
  }

  function fireName() {
    if (!started) {
      alert("먼저 시작 눌러주세요");
      return;
    }

    if (firing) return;

    if (availableNames.length === 0) {
      alert("더 뽑을 닉네임이 없습니다");
      return;
    }

    firing = true;

    const index = Math.floor(Math.random() * availableNames.length);
    const picked = availableNames[index];
    availableNames.splice(index, 1);

    playLaunchSound();
    showShotEffect(picked);

    setTimeout(() => {
      currentName.textContent = picked;
      history.push(picked);
      renderHistory();
      updateStatus();
      playResultSound();
      firing = false;
    }, 620);
  }

  function resetGame() {
    originalNames = [];
    availableNames = [];
    history = [];
    started = false;
    firing = false;
    currentName.textContent = "-";
    shotName.classList.remove("launch");
    renderHistory();
    updateStatus();
  }

  renderHistory();
  updateStatus();
</script>
